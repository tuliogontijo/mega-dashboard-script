<script>
  /*****************
  *  Tela de Login
  *****************/
  const labelEmail = "Usuário";
  const labelPassword = "Senha";
  const backgroundLogin = {
    keepStandard: true, // MUDE PARA false PARA INSERIR UMA IMAGEM DE FUNDO PERSONALIZADA NA TELA DE LOGIN
    light: "INSIRA A URL DA IMAGEM DE FUNDO PARA O TEMA CLARO", // URL da imagem de fundo para o tema claro
    dark: "INSIRA A URL DA IMAGEM DE FUNDO PARA O TEMA ESCURO" // URL da imagem de fundo para o tema escuro
  };
  const logoSize = 10; // Padrão é 4

  /*****************
  *  Dashboard
  *****************/
  const translateMessageTimeToPTBR = true; // Traduzir hora das mensagem e separadores para o PT-BR
  const removeAutoFocusChatInputAtMobile = true; // Remove o auto foco do campo de input de mensagem ao abrir uma conversa no mobile
  const backgroundChat = {
    keepStandard: true, // MUDE PARA false PARA INSERIR UMA IMAGEM DE FUNDO PERSONALIZADA NO DASHBOARD
    light: "INSIRA A URL DA IMAGEM DE FUNDO PARA O TEMA CLARO", // URL da imagem de fundo para o tema claro
    dark: "INSIRA A URL DA IMAGEM DE FUNDO PARA O TEMA ESCURO" // URL da imagem de fundo para o tema escuro
  };
  const bublleMessageColor = {
    keepStandard: false, // MUDE PARA false PARA PERSONALIZAR AS CORES DOS BALÕES DE MENSAGEM
    outgoing: {
      light: "#d9fdd3", // Cor dos balões de mensagens enviadas
      dark: "#144d37" // Cor dos balões de mensagens enviadas
    },
    incoming: {
      light: "#ffffff", // Cor dos balões de mensagens recebidas
      dark: "#242626" // Cor dos balões de mensagens recebidas
    }
  };



  /**********************************************************************************************/

  const isLoginPage = window.location.pathname.includes('/app/login');
  const isMobile = window.innerWidth <= 768;
  let colorTheme = '';

  const tasksLogin = [
    {
      name: 'changeLabelEmail',
      selector: 'label[for="email_address"]',
      action: (elemento) => elemento.innerHTML = labelEmail,
      done: false
    },
    {
      name: 'changeLabelPassword',
      selector: 'label[for="password"]',
      action: (elemento) => {
        const label = elemento.innerHTML;
        elemento.innerHTML = labelPassword + label.substring(label.indexOf("<p>"), label.length);
      },
      done: false
    },
    !backgroundLogin.keepStandard && {
      name: 'changeBackgroundLogin',
      selector: 'main',
      action: (elemento) => {
        if (colorTheme === 'light') {
          elemento.style.background = `linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('${backgroundLogin[colorTheme]}')`;
          elemento.style.backgroundSize = 'contain';
        } else if (colorTheme === 'dark') {
          elemento.style.background = '';
          elemento.style.backgroundImage = `url('${backgroundLogin[colorTheme]}')`
        }
      },
      persistent: true,
      done: false
    },
    {
      name: 'changeLogoSize',
      selector: 'main > section img',
      action: (elemento) => elemento.forEach(el => el.style.setProperty('height', `${logoSize}rem`, 'important')),
      multiple: true,
      done: false
    },

  ];

  const tasksChat = [
    translateMessageTimeToPTBR && {
      name: 'translateMessageSeparator',
      selector: '[id^=messageseparator] span',
      action: (elemento) => elemento.forEach(el => {
        if (!el.hasAttribute('data-translated')) {
          const current = el.innerHTML;
          el.innerHTML = translateSeparator(current);
          el.title = translateSeparator(current);
          const parentDiv = el.parentElement;
          parentDiv.setAttribute('content', translateSeparator(current));
          el.setAttribute('data-translated', 'true');
        }
      }),
      multiple: true,
      persistent: true,
    },
    translateMessageTimeToPTBR && {
      name: 'translateMessageTime',
      selector: '[id^=message] time',
      action: (elemento) => elemento.forEach(el => {
        if (!el.hasAttribute('data-translated')) {
          const current = el.innerHTML;
          el.innerHTML = translateMessageTime(current);
          el.setAttribute('data-translated', 'true');
        }
      }),
      multiple: true,
      persistent: true,
    },
    translateMessageTimeToPTBR && {
      name: 'translatePopper',
      selector: '[id^=popper_][data-popper-placement=top]',
      action: (elemento) => elemento.forEach(el => {
        if (!el.hasAttribute('data-translated')) {
          const current = el.querySelector('.v-popper__inner div div').innerHTML;
          el.querySelector('.v-popper__inner div div').innerHTML = translateMessageTime(current);
          el.setAttribute('data-translated', 'true');
        }
      }),
      multiple: true,
      persistent: true,
    },
    !backgroundChat.keepStandard && {
      name: 'changeBackgroundChat',
      selector: 'ul.conversation-panel',
      action: (elemento) => {
        if (colorTheme === 'light') {
          elemento.style.background = `linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('${backgroundChat[colorTheme]}')`;
          elemento.style.backgroundSize = 'contain';
        } else if (colorTheme === 'dark') {
          elemento.style.backgroundImage = `url('${backgroundChat[colorTheme]}')`
        }
      },
      persistent: true,
    },
    !bublleMessageColor.keepStandard && {
      name: 'changeBubbleOutgoingMessageColor',
      selector: '.right-bubble',
      action: (elemento) => {
        elemento.forEach(el => {
          el.style.backgroundColor = bublleMessageColor.outgoing[colorTheme];
          el.style.boxShadow = "0px 0.5px 1px #666666";
          if (colorTheme === 'light') {
            const text = el.querySelector('p');
            const time = el.querySelector('time');
            text && (text.style.color = '#000');
            time && (time.style.color = '#666666');
          }
        })
      },
      multiple: true,
      persistent: true,
    },
    !bublleMessageColor.keepStandard && {
      name: 'changeBubbleIncomingMessageColor',
      selector: '.left-bubble',
      action: (elemento) => {
        elemento.forEach(el => {
          el.style.backgroundColor = bublleMessageColor.incoming[colorTheme];
          el.style.boxShadow = "0px 0.5px 2px #AAAAAA";
        })
      },
      multiple: true,
      persistent: true,
    },
    removeAutoFocusChatInputAtMobile && {
      name: 'removeAutoFocusChatInputAtMobile',
      selector: '.ProseMirror.ProseMirror-woot-style',
      action: (elemento) => {
        if (isMobile && elemento && elemento.getAttribute('contenteditable') === 'true') {
          elemento.setAttribute('contenteditable', 'false');
          const enableEditing = () => {
            elemento.setAttribute('contenteditable', 'true');
            elemento.focus();
            elemento.removeEventListener('touchstart', enableEditing);
            elemento.removeEventListener('click', enableEditing);
          };
          elemento.addEventListener('touchstart', enableEditing);
          elemento.addEventListener('click', enableEditing);
        }
      },
      multiple: false,
      persistent: true,
    },
  ];

  const tasks = isLoginPage ? tasksLogin : tasksChat;



  /**********************************************************************************************
  *  Mutations
  **********************************************************************************************/

  const body = new MutationObserver(() => {
    tasks.forEach(task => {
      if (!task.done) {
        if (task.multiple) {
          const elementos = document.querySelectorAll(task.selector);
          if (elementos.length > 0) {
            task.action(elementos);
            task.done = task.persistent ? false : true;
          }
        } else {
          const elemento = document.querySelector(task.selector);
          if (elemento) {
            task.action(elemento);
            task.done = task.persistent ? false : true;
          }
        }
      }
    });

    if (isLoginPage) {
      colorTheme = document.getElementsByTagName('html')[0].classList.contains('dark') ? 'dark' : 'light';
    } else {
      colorTheme = document.getElementsByTagName('html')[0].style.colorScheme;
    }
    let isEvoInboxPage = window.location.search.includes('?provider=evolution');

    if (validateEvoInboxName && isEvoInboxPage) {
      const validateEvoInboxNameExecuted = document.querySelector('[headerbuttontext="SETTINGS.INBOXES.NEW_INBOX"] form[validation-installed="true"]');
      if (!validateEvoInboxNameExecuted) {
        console.log("chamou validação")
        setupEvoInboxNameValidation();
      }
    }

  });


  body.observe(document.body, { childList: true, subtree: true });

  /**********************************************************************************************
  *  Styles
  **********************************************************************************************/

  let stylesId, css;
  if (isLoginPage) {
    css = `
      /* Estilos página de login */
    `;
    stylesId = 'login-styles';


  } else {
    css = `
      /* Estilos página de chat */
    `;
    stylesId = 'chat-styles';
  }
  injectCSS(css, stylesId);

  /**********************************************************************************************
  *  Functions
  **********************************************************************************************/

  function injectCSS(css, id) {
    const existingStyle = document.getElementById(id);
    if (existingStyle) {
      existingStyle.remove();
    }

    const style = document.createElement('style');
    style.id = id;
    style.textContent = css;
    document.head.appendChild(style);
  }

  const translateSeparator = (text) => {
    const monthTranslationsComplete = {
      'January': 'Janeiro', 'February': 'Fevereiro', 'March': 'Março',
      'April': 'Abril', 'May': 'Maio', 'June': 'Junho',
      'July': 'Julho', 'August': 'Agosto', 'September': 'Setembro',
      'October': 'Outubro', 'November': 'Novembro', 'December': 'Dezembro'
    };

    const monthTranslations = {
      'Jan': 'Jan', 'Feb': 'Fev', 'Mar': 'Mar', 'Apr': 'Abr',
      'May': 'Mai', 'Jun': 'Jun', 'Jul': 'Jul', 'Aug': 'Ago',
      'Sep': 'Set', 'Oct': 'Out', 'Nov': 'Nov', 'Dec': 'Dez'
    };

    return text
      .replace(/\b(January|February|March|April|May|June|July|August|September|October|November|December)\b/g,
        mes => monthTranslationsComplete[mes])
      .replace(/(\d{1,2}) (\w+) (\d{4}) (\d{2}:\d{2})/, '$1 de $2 de $3, $4')
      .replace(/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b/g,
        mes => monthTranslations[mes]);
  }

  function translateMessageTime(text) {
    const monthTranslations = {
      'Jan': 'Jan', 'Feb': 'Fev', 'Mar': 'Mar', 'Apr': 'Abr',
      'May': 'Mai', 'Jun': 'Jun', 'Jul': 'Jul', 'Aug': 'Ago',
      'Sep': 'Set', 'Oct': 'Out', 'Nov': 'Nov', 'Dec': 'Dez'
    };

    const timeRegex = /(\w{3})\s+(\d{1,2}),\s+(\d{1,2}):(\d{2})(?:\s+(AM|PM))?/i;
    const match = text.match(timeRegex);

    if (!match) {
      console.warn('Formato de hora não reconhecido:', text);
      return text;
    }

    const [, month, day, hour, minute, period] = match;

    let hour24 = parseInt(hour, 10);

    if (period) {
      const upperPeriod = period.toUpperCase();
      if (upperPeriod === 'AM') {
        if (hour24 === 12) hour24 = 0;
      } else if (upperPeriod === 'PM') {
        if (hour24 !== 12) hour24 += 12;
      }
    }

    const formattedHour = hour24.toString().padStart(2, '0');
    const translatedMonth = monthTranslations[month] || month;

    return `${day} ${translatedMonth}, ${formattedHour}:${minute}`;
  }

</script>
